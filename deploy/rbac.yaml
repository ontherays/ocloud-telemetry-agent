apiVersion: v1
kind: ServiceAccount
metadata:
  name: ocloud-telemetry-agent
  namespace: ocloud-telemetry
---
# Read-only. The agent observes; it never mutates cluster state.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ocloud-telemetry-agent
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ocloud-telemetry-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ocloud-telemetry-agent
subjects:
  - kind: ServiceAccount
    name: ocloud-telemetry-agent
    namespace: ocloud-telemetry

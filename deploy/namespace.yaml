apiVersion: v1
kind: Namespace
metadata:
  name: ocloud-telemetry
  labels:
    # StarlingX enforces Pod Security Admission. The agent needs hostPID and
    # uid 0 (energy_uj is 0400 root:root since CVE-2020-8694), so the namespace
    # must be labelled privileged or the DaemonSet will never schedule.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
